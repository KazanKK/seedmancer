name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: GOTOOLCHAIN=auto go build ./...

      - name: Test
        run: GOTOOLCHAIN=auto go test ./...
