name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: GOTOOLCHAIN=auto go build ./...

      - name: Test
        run: GOTOOLCHAIN=auto go test ./...

  playwright-package:
    name: Build @seedmancer/playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/playwright

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
